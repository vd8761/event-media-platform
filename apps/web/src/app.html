<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>EventLens</title>
    <meta name="description" content="Event media management — organiser galleries with face-matched participant delivery." />

    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Guests reach galleries through emailed links that get forwarded and
         pasted into chats, so the unfurl is the first thing many participants
         see of the product. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EventLens" />
    <meta property="og:title" content="EventLens" />
    <meta
      property="og:description"
      content="Event media management — organiser galleries with face-matched participant delivery."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <!-- Applies the stored theme before first paint. Inline and synchronous on
         purpose: anything deferred lets a dark-by-default app flash white on
         every cold load. Keep in sync with src/lib/theme.svelte.ts. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('eventlens-theme');
          if (t !== 'oled' && t !== 'dark' && t !== 'light') {
            t = 'oled';
          }
          var r = document.documentElement;
          if (t !== 'light') {
            r.classList.add('dark');
          }
          if (t === 'oled') {
            r.classList.add('oled');
          }
          r.style.colorScheme = t === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.classList.add('dark', 'oled');
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-immich-bg dark:bg-immich-dark-bg">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
