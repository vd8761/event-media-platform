# Local development: Postgres (VectorChord) + Redis only; run the backend with
# `pnpm --filter backend start:dev`.
name: eventlens-dev

services:
  database:
    # Immich's Postgres image — pgvector + VectorChord preinstalled
    # (docs/plan/03-database-schema.md)
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventlens
    ports:
      # host 5433 — a native Windows PostgreSQL commonly owns 5432
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped

  redis:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ML sidecar for local dev — upstream prebuilt CPU image (apps/ml is a
  # verbatim copy, so the API is identical; the GPU VM builds apps/ml with
  # DEVICE=cuda). First start downloads buffalo_l (~300 MB) into model-cache.
  ml:
    image: ghcr.io/immich-app/immich-machine-learning:release
    environment:
      MACHINE_LEARNING_MODEL_TTL: "0"
      MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION__DETECTION: buffalo_l
      MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION__RECOGNITION: buffalo_l
    ports:
      - "3003:3003"
    volumes:
      - model-cache:/cache
    restart: unless-stopped

  # SMTP catcher for the email pipeline: SMTP on 1025, web UI/API on 8025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # Local S3 stand-in for Cloudflare R2 (same @aws-sdk/client-s3 path).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventlens
      MINIO_ROOT_PASSWORD: eventlens-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # Creates the dev bucket on startup, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 eventlens eventlens-secret; do sleep 1; done;
      mc mb --ignore-existing local/eventlens-media;
      "
    restart: "no"

volumes:
  dbdata:
  miniodata:
  model-cache:
