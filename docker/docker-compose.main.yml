# Main VM (docs/plan/11-deployment.md §1): backend (api,ingest) + Postgres +
# Redis + proxy. Postgres/Redis must be reachable from the GPU VM over the
# tailnet ONLY — bind/firewall accordingly; never expose 5432/6379 publicly.
name: eventlens

services:
  backend:
    image: eventlens-backend
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      EL_WORKERS_INCLUDE: api,ingest
      # DATABASE_URL / REDIS_URL come from .env — point them at the containers
      # below, or at Neon/Upstash if you run those managed instead.
    volumes:
      - staging:/staging
    depends_on:
      - database
      - redis
    restart: always

  database:
    # pgvector + VectorChord preinstalled; pinned to what Immich ships
    # (docs/plan/03-database-schema.md)
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      # These seed the container's own role/database; the app reaches it via
      # DATABASE_URL, so keep the two in step.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-eventlens}
    volumes:
      - dbdata:/var/lib/postgresql/data
    shm_size: 128mb
    # bind to localhost + tailnet interface only, e.g.:
    # ports: ["127.0.0.1:5432:5432", "100.x.y.z:5432:5432"]
    restart: always

  redis:
    image: valkey/valkey:8
    command: valkey-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    # bind to localhost + tailnet interface only (an open Redis is RCE-adjacent)
    restart: always

  proxy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on:
      - backend
    restart: always

volumes:
  dbdata:
  staging:
  caddydata:
