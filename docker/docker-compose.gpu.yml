# GPU VM (docs/plan/11-deployment.md §2): backend-worker (media role) + the
# verbatim immich_ml sidecar built with DEVICE=cuda. Prereqs: NVIDIA driver +
# nvidia-container-toolkit. DB/Redis are reached over the tailnet.
name: eventlens-gpu

services:
  backend-worker:
    image: eventlens-backend
    env_file: .env
    environment:
      EL_WORKERS_INCLUDE: media
      # Set ONLY on the 2nd..Nth GPU VM — facialRecognition must have exactly
      # one consumer globally (risk R1):
      # EL_QUEUES_EXCLUDE: facialRecognition
      MACHINE_LEARNING_URL: http://ml:3003
      # Reported on the admin system panel so operators can see which sidecar
      # build this VM is running.
      EL_ML_DEVICE: cuda
      # The main VM already ran them; two processes racing the same migration
      # is the one thing the advisory lock cannot make cheap.
      DB_SKIP_MIGRATIONS: "true"
      # DATABASE_URL / REDIS_URL come from .env — the tailnet IP of the main
      # VM, or the Neon/Upstash endpoints if those are managed.
    volumes:
      - cache:/cache
    # The GPU is reserved here purely for telemetry: it puts nvidia-smi and the
    # driver in this container so the worker's heartbeat can report GPU
    # utilisation to the admin panel. Inference itself happens in `ml` below.
    # Drop this block if you would rather not expose the device twice — the
    # panel then shows the worker's CPU only.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]
    depends_on:
      - ml
    restart: always

  ml:
    # apps/ml is the verbatim copy of immich:machine-learning (M3):
    #   docker build --build-arg DEVICE=cuda -t eventlens-ml:cuda apps/ml
    image: eventlens-ml:cuda
    environment:
      MACHINE_LEARNING_MODEL_TTL: "0"
      MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION__DETECTION: buffalo_l
      MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION__RECOGNITION: buffalo_l
    volumes:
      - model-cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

volumes:
  cache:
  model-cache:
